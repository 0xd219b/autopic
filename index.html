<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Image Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
<style>
  :root {
    --font-title: "Space Grotesk";
    --font-body: "Manrope";
    --bg-0: #f7f4ed;
    --bg-1: #eef4f2;
    --surface: rgba(255, 255, 255, 0.88);
    --surface-strong: #ffffff;
    --ink: #1b2321;
    --muted: #65706f;
    --accent: #1c9a8a;
    --accent-2: #ff7a59;
    --accent-3: #2f80ed;
    --border: rgba(25, 35, 33, 0.12);
    --shadow: 0 18px 40px rgba(14, 24, 21, 0.12);
    --shadow-soft: 0 10px 20px rgba(14, 24, 21, 0.08);
    --radius-lg: 18px;
    --radius-md: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-body), "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(180deg, var(--bg-0), var(--bg-1));
    color: var(--ink);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: "";
    position: fixed;
    inset: -10% -10% auto -10%;
    height: 55vh;
    background:
      radial-gradient(680px 380px at 12% 12%, rgba(28, 154, 138, 0.22), transparent 60%),
      radial-gradient(720px 420px at 92% 0%, rgba(255, 122, 89, 0.18), transparent 60%);
    z-index: -2;
    pointer-events: none;
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(900px 520px at 85% 85%, rgba(47, 128, 237, 0.12), transparent 60%);
    z-index: -3;
    pointer-events: none;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    gap: 16px;
    padding: 16px;
  }

  /* 顶部工具栏 */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 14px 18px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
    animation: floatIn 0.6s ease both;
  }
  .toolbar::after {
    content: "";
    position: absolute;
    inset: 0 auto auto 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, rgba(28,154,138,0.8), rgba(255,122,89,0.4), transparent);
    opacity: 0.7;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-right: 8px;
  }
  .brand-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, #1c9a8a, #3bbf9b);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 10px 20px rgba(28, 154, 138, 0.35);
  }
  .brand-title {
    font-family: var(--font-title), "Noto Sans SC", sans-serif;
    font-size: 18px;
    font-weight: 700;
  }
  .brand-subtitle {
    font-size: 12px;
    color: var(--muted);
  }
  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar-link {
    margin-left: auto;
  }
  label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }
  .input-block {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .input-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .toolbar input[type="number"] {
    width: 78px;
    padding: 6px 10px;
    background: var(--surface-strong);
    border: 1px solid var(--border);
    color: var(--ink);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .toolbar .sep { color: var(--muted); font-weight: 600; }
  input[type="range"] { accent-color: var(--accent); }
  .range-row {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .range-row input[type="range"] { width: 110px; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--surface-strong);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .status-pill::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(28, 154, 138, 0.15);
  }

  :is(.btn-primary, .btn-success, .btn-warning, .btn-info, .btn-ghost) {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid transparent;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    text-decoration: none;
  }
  :is(.btn-primary, .btn-success, .btn-warning, .btn-info, .btn-ghost) i {
    font-size: 16px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 10px 18px rgba(28, 154, 138, 0.25);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 12px 20px rgba(28, 154, 138, 0.32); }
  .btn-success {
    background: #2e9c7f;
    color: #fff;
    box-shadow: 0 10px 18px rgba(46, 156, 127, 0.25);
  }
  .btn-success:hover { transform: translateY(-1px); }
  .btn-warning {
    background: var(--accent-2);
    color: #fff;
    box-shadow: 0 10px 18px rgba(255, 122, 89, 0.28);
  }
  .btn-warning:hover { transform: translateY(-1px); }
  .btn-info {
    background: var(--surface-strong);
    color: var(--ink);
    border: 1px solid var(--border);
  }
  .btn-info:hover { border-color: rgba(28, 154, 138, 0.5); color: var(--accent); }
  .btn-info.active {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1px dashed var(--border);
  }
  .btn-ghost:hover { border-color: rgba(28, 154, 138, 0.6); color: var(--accent); }
  .btn-compact { padding: 6px 10px; font-size: 12px; }

  button:focus-visible,
  input:focus-visible,
  a:focus-visible {
    outline: 2px solid rgba(28, 154, 138, 0.5);
    outline-offset: 2px;
  }

  /* 主内容区 */
  .main { display: flex; flex: 1; gap: 16px; overflow: hidden; }

  /* 左侧网格区域 */
  .grid-panel {
    flex: 1;
    overflow: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    animation: floatIn 0.6s ease 0.05s both;
  }
  .grid-zoom-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid var(--border);
    border-radius: 999px;
    margin-bottom: 12px;
    backdrop-filter: blur(8px);
    box-shadow: var(--shadow-soft);
    flex-shrink: 0;
  }
  .grid-zoom-bar button:not(.btn-compact) {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--ink);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }
  .grid-zoom-bar button:hover {
    transform: translateY(-1px);
    border-color: rgba(28, 154, 138, 0.5);
    color: var(--accent);
  }
  .grid-zoom-bar .btn-compact {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--ink);
  }
  .grid-zoom-bar .zoom-val { font-size: 12px; color: var(--muted); min-width: 40px; text-align: center; }
  .grid-zoom-bar i { font-size: 16px; }
  .grid-container {
    display: inline-grid;
    gap: 1px;
    background: #d6e0dd;
    border: 1px solid #d6e0dd;
    border-radius: var(--radius-sm);
    transform-origin: top center;
    transition: transform 0.15s ease;
    box-shadow: 0 10px 24px rgba(20, 30, 28, 0.08);
  }
  .grid-cell {
    cursor: pointer;
    position: relative;
    image-rendering: pixelated;
    transition: outline 0.15s ease, box-shadow 0.15s ease;
  }
  .grid-cell:hover { outline: 2px solid rgba(28, 154, 138, 0.8); outline-offset: -2px; z-index: 1; }
  .grid-cell.selected { outline: 2px solid var(--accent-2); outline-offset: -2px; z-index: 2; box-shadow: 0 0 0 2px rgba(255, 122, 89, 0.2); }
  .grid-cell canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

  /* 右侧预览/编辑区 */
  .side-panel {
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: floatIn 0.6s ease 0.1s both;
  }
  .side-header {
    padding: 12px 16px;
    background: linear-gradient(135deg, rgba(28, 154, 138, 0.08), rgba(255, 122, 89, 0.08));
    font-size: 14px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .side-title {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-title), "Noto Sans SC", sans-serif;
  }
  .side-body {
    flex: 1;
    overflow: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .panel-card {
    background: var(--surface-strong);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 12px;
    box-shadow: var(--shadow-soft);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .preview-canvas-wrap {
    background:
      linear-gradient(45deg, rgba(15, 28, 24, 0.08) 25%, transparent 25%) 0 0 / 16px 16px,
      linear-gradient(-45deg, rgba(15, 28, 24, 0.08) 25%, transparent 25%) 0 0 / 16px 16px,
      linear-gradient(45deg, transparent 75%, rgba(15, 28, 24, 0.08) 75%) 0 0 / 16px 16px,
      linear-gradient(-45deg, transparent 75%, rgba(15, 28, 24, 0.08) 75%) 0 0 / 16px 16px;
    background-color: #f5f7f6;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
  }
  .preview-canvas-wrap canvas {
    max-width: 100%;
    max-height: 340px;
    image-rendering: pixelated;
  }

  /* 编辑工具 */
  .tool-columns {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    align-items: start;
  }
  .tool-col {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .tool-col-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .tool-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tool-row label { font-size: 12px; color: var(--muted); }
  .tool-row.size-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px;
  }
  .tool-row.size-row input[type="range"] { width: 100%; }
  .tool-row.color-row {
    display: grid;
    grid-template-columns: auto auto;
    align-items: center;
    gap: 8px;
  }
  .tool-columns .btn-info {
    padding: 6px 10px;
    font-size: 12px;
    border-radius: 10px;
    justify-content: flex-start;
  }
  .tool-columns .btn-info span { white-space: nowrap; }
  .tool-columns .color-pick {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
  }

  /* 变换控制 */
  .transform-section {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    background: #f7faf9;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .transform-section .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .transform-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .transform-row label { font-size: 12px; color: var(--muted); min-width: 44px; }
  .transform-row input[type="range"] { flex: 1; }
  .transform-row .val { font-size: 12px; color: var(--ink); min-width: 40px; text-align: right; }
  .transform-row input[type="number"] {
    width: 64px;
    padding: 4px 6px;
    background: #fff;
    border: 1px solid var(--border);
    color: var(--ink);
    border-radius: 8px;
    font-size: 12px;
  }

  /* 上传区域 */
  .upload-area {
    border: 2px dashed rgba(28, 154, 138, 0.4);
    border-radius: var(--radius-md);
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    background: linear-gradient(135deg, rgba(28, 154, 138, 0.12), rgba(255, 122, 89, 0.08));
    width: min(620px, 92%);
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: auto 0;
  }
  .upload-area:hover {
    border-color: rgba(28, 154, 138, 0.8);
    transform: translateY(-2px);
    box-shadow: var(--shadow-soft);
  }
  .upload-area p { color: var(--muted); margin-top: 0; font-size: 14px; }
  .upload-area .icon {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: rgba(28, 154, 138, 0.15);
    color: var(--accent);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .info-text { font-size: 12px; color: var(--muted); }
  .coord-text { font-size: 12px; color: var(--accent-3); }

  /* 隐藏的 file input */
  #fileInput { display: none; }

  /* 提示 */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: #fff;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    box-shadow: var(--shadow-soft);
  }
  .toast.show { opacity: 1; }

  @keyframes floatIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 1100px) {
    .main { flex-direction: column; }
    .side-panel { width: 100%; }
    .toolbar-link { margin-left: 0; width: 100%; justify-content: flex-start; }
  }
  @media (max-width: 720px) {
    .toolbar { padding: 12px; }
    .brand { width: 100%; }
    .toolbar-group { width: 100%; }
    .toolbar input[type="number"] { width: 70px; }
    .grid-zoom-bar { flex-wrap: wrap; justify-content: center; }
    .tool-columns { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- 工具栏 -->
  <div class="toolbar">
    <div class="brand">
      <div class="brand-icon"><i class="ri-magic-line"></i></div>
      <div class="brand-text">
        <div class="brand-title">Gemini Image Toolkit</div>
        <div class="brand-subtitle">Gemini 水印去除 · 网格切分 · 块编辑</div>
      </div>
    </div>

    <div class="toolbar-group">
      <button class="btn-primary" onclick="document.getElementById('fileInput').click()">
        <i class="ri-upload-cloud-2-line"></i><span>上传图片</span>
      </button>
      <input type="file" id="fileInput" accept="image/*">
      <div class="status-pill" id="infoText">请上传图片</div>
    </div>

    <div class="toolbar-group">
      <div class="input-block">
        <label>目标尺寸</label>
        <div class="input-row">
          <input type="number" id="targetW" value="1024" min="128" step="128">
          <span class="sep">&times;</span>
          <input type="number" id="targetH" value="896" min="128" step="128">
        </div>
      </div>
      <div class="input-block">
        <label>块大小</label>
        <input type="number" id="blockSize" value="128" min="32" step="32">
      </div>
    </div>

    <div class="toolbar-group">
      <button class="btn-info" id="btnWatermark" onclick="toggleWatermarkRemoval()">
        <i class="ri-eraser-line"></i><span>去水印: 开</span>
      </button>
      <div class="input-block">
        <label>强度</label>
        <div class="range-row">
          <input type="range" id="wmGain" min="0" max="30" value="0" step="1"
            title="0=自动, 手动调大可增强去除效果">
          <span class="info-text" id="wmGainVal" style="min-width:32px;">自动</span>
        </div>
      </div>
      <button class="btn-ghost" onclick="reapplyWatermark()">
        <i class="ri-refresh-line"></i><span>重新去水印</span>
      </button>
    </div>

    <div class="toolbar-group">
      <button class="btn-success" onclick="applyResize()">
        <i class="ri-grid-line"></i><span>应用切分</span>
      </button>
      <button class="btn-warning" onclick="exportImage()">
        <i class="ri-download-2-line"></i><span>导出图片</span>
      </button>
    </div>

    <div class="toolbar-group toolbar-link">
      <a href="grid9.html" class="btn-info">
        <i class="ri-layout-grid-line"></i><span>九宫格切图</span>
      </a>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <!-- 网格区域 -->
    <div class="grid-panel" id="gridPanel">
      <div class="grid-zoom-bar" id="zoomBar" style="display:none;">
        <button onclick="zoomGrid(-10)" title="缩小"><i class="ri-zoom-out-line"></i></button>
        <input type="range" id="gridZoom" min="5" max="100" value="100" style="width:120px;"
          oninput="setGridZoom(parseInt(this.value))">
        <button onclick="zoomGrid(10)" title="放大"><i class="ri-zoom-in-line"></i></button>
        <span class="zoom-val" id="gridZoomVal">100%</span>
        <button class="btn-info btn-compact" onclick="zoomToFit()">适应</button>
        <button class="btn-info btn-compact" onclick="setGridZoom(100)">1:1</button>
      </div>
      <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="icon"><i class="ri-image-add-line"></i></div>
        <p>点击或拖拽上传图片</p>
        <p style="font-size:12px; margin-top:4px;">支持 PNG / JPG / WebP</p>
      </div>
      <div class="grid-container" id="gridContainer" style="display:none;"></div>
    </div>

    <!-- 右侧面板 -->
    <div class="side-panel">
      <div class="side-header">
        <div class="side-title"><i class="ri-pencil-ruler-2-line"></i><span id="sideTitle">预览 & 编辑</span></div>
        <span class="coord-text" id="coordText"></span>
      </div>
      <div class="side-body">
        <div class="panel-card">
          <div class="card-title">预览</div>
          <div class="preview-canvas-wrap" id="previewWrap">
            <canvas id="previewCanvas" width="128" height="128"></canvas>
          </div>
        </div>

        <div class="panel-card">
          <div class="card-title">绘制工具</div>
          <div class="tool-columns">
            <div class="tool-col">
              <div class="tool-col-title">工具</div>
              <button class="btn-info" id="btnEraser" onclick="setTool('eraser')"><i class="ri-eraser-line"></i><span>橡皮擦</span></button>
              <button class="btn-info" id="btnBrush" onclick="setTool('brush')"><i class="ri-brush-3-line"></i><span>画笔</span></button>
              <button class="btn-info" id="btnMove" onclick="setTool('move')"><i class="ri-drag-move-line"></i><span>移动</span></button>
            </div>

            <div class="tool-col">
              <div class="tool-col-title">参数</div>
              <div class="tool-row size-row">
                <label>大小:</label>
                <input type="range" id="brushSize" min="1" max="50" value="10">
                <span id="brushSizeVal" style="font-size:12px; min-width:24px;">10</span>
              </div>
              <div class="tool-row color-row">
                <label>颜色:</label>
                <input type="color" class="color-pick" id="brushColor" value="#ffffff">
              </div>
            </div>

            <div class="tool-col">
              <div class="tool-col-title">操作</div>
              <button class="btn-info" onclick="undoEdit()"><i class="ri-arrow-go-back-line"></i><span>撤销</span></button>
              <button class="btn-info" onclick="resetBlock()"><i class="ri-restart-line"></i><span>重置块</span></button>
              <button class="btn-info" onclick="clearBlock()"><i class="ri-delete-bin-6-line"></i><span>清空块</span></button>
            </div>
          </div>
        </div>

        <div class="panel-card">
          <div class="card-title">块内容变换</div>
          <div class="transform-section">
            <div class="section-title">缩放 & 平移</div>
            <div class="transform-row">
              <label>缩放:</label>
              <input type="range" id="transformScale" min="10" max="200" value="100" step="1">
              <span class="val" id="transformScaleVal">100%</span>
            </div>
            <div class="transform-row">
              <label>X 偏移:</label>
              <input type="number" id="transformX" value="0" step="1">
              <label>Y 偏移:</label>
              <input type="number" id="transformY" value="0" step="1">
            </div>
            <div class="transform-row">
              <button class="btn-info" onclick="applyTransform()"><i class="ri-check-line"></i><span>应用变换</span></button>
              <button class="btn-info" onclick="resetTransformUI()"><i class="ri-restart-line"></i><span>重置参数</span></button>
            </div>
            <div class="transform-row">
              <button class="btn-info" onclick="applyToRow()" title="将当前变换参数应用到整行"><i class="ri-arrow-right-line"></i><span>整行</span></button>
              <button class="btn-info" onclick="applyToCol()" title="将当前变换参数应用到整列"><i class="ri-arrow-down-line"></i><span>整列</span></button>
              <button class="btn-info" onclick="applyToAll()" title="将当前变换参数应用到全部块"><i class="ri-layout-grid-line"></i><span>全部</span></button>
            </div>
            <p class="info-text">缩放: 调整块内图像大小。平移: 移动块内图像位置。</p>
            <p class="info-text">"整行/整列/全部" 将当前块的变换参数批量应用。</p>
          </div>
        </div>

        <div class="panel-card">
          <p class="info-text">左键绘制/擦除，点击网格中的块进行选择。</p>
          <p class="info-text">橡皮擦: 擦除为透明（抠图）。画笔: 用选定颜色绘制。</p>
          <p class="info-text" id="blockInfo"></p>
        </div>
      </div>
    </div>
  </div>

// --- 常量 (来自 gemini-watermark-remover) ---
const WM_EPSILON = 1e-8;
const ALPHA_NOISE_FLOOR = 3 / 255;
const ALPHA_THRESHOLD = 0.002;
const MAX_ALPHA = 0.99;
const LOGO_VALUE = 255;
const RESIDUAL_RECALIBRATION_THRESHOLD = 0.5;
const MIN_SUPPRESSION_FOR_SKIP_RECALIBRATION = 0.18;
const MIN_RECALIBRATION_SCORE_DELTA = 0.18;
const NEAR_BLACK_THRESHOLD = 5;
const MAX_NEAR_BLACK_RATIO_INCREASE = 0.05;
const OUTLINE_REFINEMENT_THRESHOLD = 0.42;
const OUTLINE_REFINEMENT_MIN_GAIN = 1.2;
const TEMPLATE_ALIGN_SHIFTS = [-0.5, -0.25, 0, 0.25, 0.5];
const TEMPLATE_ALIGN_SCALES = [0.99, 1, 1.01];
const SUBPIXEL_REFINE_SHIFTS = [-0.25, 0, 0.25];
const SUBPIXEL_REFINE_SCALES = [0.99, 1, 1.01];
const ALPHA_GAIN_CANDIDATES = [1.05, 1.12, 1.2, 1.28, 1.36, 1.45, 1.52, 1.6, 1.7, 1.85, 2.0, 2.2, 2.4, 2.6];
const ADAPTIVE_DEFAULT_THRESHOLD = 0.35;
const MIN_STANDARD_SPATIAL_SCORE = 0.3;
const MIN_STANDARD_GRADIENT_SCORE = 0.12;
const MIN_ADAPTIVE_CONFIDENCE = 0.5;
const MIN_ADAPTIVE_SPATIAL_SCORE = 0.45;
const MIN_ADAPTIVE_GRADIENT_SCORE = 0.12;
const MIN_ADAPTIVE_SIZE = 40;
const MAX_ADAPTIVE_SIZE = 192;

// --- 基础工具函数 ---
const wmClamp = (v, min, max) => Math.max(min, Math.min(max, v));

async function loadBgImage(src) {
  const img = new Image();
  img.src = src;
  await img.decode();
  console.log(`[水印] loadBgImage: ${img.width}×${img.height}`);
  return img;
}

function calculateAlphaMap(bgImageData) {
  const { width, height, data } = bgImageData;
  const alphaMap = new Float32Array(width * height);
  for (let i = 0; i < alphaMap.length; i++) {
    const idx = i * 4;
    alphaMap[i] = Math.max(data[idx], data[idx + 1], data[idx + 2]) / 255.0;
  }
  return alphaMap;
}

function removeWatermark(imageData, alphaMap, position, options = {}) {
  const { x, y, width, height } = position;
  const alphaGain = (Number.isFinite(options.alphaGain) && options.alphaGain > 0) ? options.alphaGain : 1;
  for (let row = 0; row < height; row++) {
    for (let col = 0; col < width; col++) {
      const imgIdx = ((y + row) * imageData.width + (x + col)) * 4;
      const alphaIdx = row * width + col;
      const rawAlpha = alphaMap[alphaIdx];
      const signalAlpha = Math.max(0, rawAlpha - ALPHA_NOISE_FLOOR) * alphaGain;
      if (signalAlpha < ALPHA_THRESHOLD) continue;
      const alpha = Math.min(rawAlpha * alphaGain, MAX_ALPHA);
      const oneMinusAlpha = 1.0 - alpha;
      for (let c = 0; c < 3; c++) {
        const watermarked = imageData.data[imgIdx + c];
        const original = (watermarked - alpha * LOGO_VALUE) / oneMinusAlpha;
        imageData.data[imgIdx + c] = Math.max(0, Math.min(255, Math.round(original)));
      }
    }
  }
}

function cloneImageData(imgData) {
  return new ImageData(new Uint8ClampedArray(imgData.data), imgData.width, imgData.height);
}

function detectWatermarkConfig(w, h) {
  if (w > 1024 && h > 1024) return { logoSize: 96, marginRight: 64, marginBottom: 64 };
  return { logoSize: 48, marginRight: 32, marginBottom: 32 };
}

function calculateWatermarkPosition(w, h, config) {
  return { x: w - config.marginRight - config.logoSize, y: h - config.marginBottom - config.logoSize, width: config.logoSize, height: config.logoSize };
}

// --- NCC 与图像处理 ---
function ncc(a, b) {
  if (a.length !== b.length || a.length === 0) return 0;
  let sumA = 0, sumB = 0;
  for (let i = 0; i < a.length; i++) { sumA += a[i]; sumB += b[i]; }
  const meanA = sumA / a.length, meanB = sumB / a.length;
  let num = 0, denA = 0, denB = 0;
  for (let i = 0; i < a.length; i++) {
    const da = a[i] - meanA, db = b[i] - meanB;
    num += da * db; denA += da * da; denB += db * db;
  }
  const den = Math.sqrt(denA * denB);
  return den < WM_EPSILON ? 0 : num / den;
}

function sobelMagnitude(gray, width, height) {
  const grad = new Float32Array(width * height);
  for (let y = 1; y < height - 1; y++) {
    for (let x = 1; x < width - 1; x++) {
      const i = y * width + x;
      const gx = -gray[i-width-1] - 2*gray[i-1] - gray[i+width-1] + gray[i-width+1] + 2*gray[i+1] + gray[i+width+1];
      const gy = -gray[i-width-1] - 2*gray[i-width] - gray[i-width+1] + gray[i+width-1] + 2*gray[i+width] + gray[i+width+1];
      grad[i] = Math.sqrt(gx*gx + gy*gy);
    }
  }
  return grad;
}

function toRegionGrayscale(imageData, x, y, size) {
  const { width, height, data } = imageData;
  if (x < 0 || y < 0 || x + size > width || y + size > height) return new Float32Array(0);
  const out = new Float32Array(size * size);
  for (let row = 0; row < size; row++) {
    for (let col = 0; col < size; col++) {
      const idx = ((y + row) * width + (x + col)) * 4;
      out[row * size + col] = (0.2126 * data[idx] + 0.7152 * data[idx+1] + 0.0722 * data[idx+2]) / 255;
    }
  }
  return out;
}

function toGrayscale(imageData) {
  const { width, height, data } = imageData;
  const out = new Float32Array(width * height);
  for (let i = 0; i < out.length; i++) {
    const j = i * 4;
    out[i] = (0.2126 * data[j] + 0.7152 * data[j+1] + 0.0722 * data[j+2]) / 255;
  }
  return out;
}

function getRegion(data, width, x, y, size) {
  const out = new Float32Array(size * size);
  for (let row = 0; row < size; row++) {
    const srcBase = (y + row) * width + x;
    const dstBase = row * size;
    for (let col = 0; col < size; col++) out[dstBase + col] = data[srcBase + col];
  }
  return out;
}

function stdDevRegion(data, width, x, y, size) {
  let sum = 0, sq = 0, n = 0;
  for (let row = 0; row < size; row++) {
    const base = (y + row) * width + x;
    for (let col = 0; col < size; col++) { const v = data[base + col]; sum += v; sq += v * v; n++; }
  }
  if (n === 0) return 0;
  const mean = sum / n;
  return Math.sqrt(Math.max(0, sq / n - mean * mean));
}

// --- Alpha Map 插值与变形 ---
function interpolateAlphaMap(src, srcSize, tgtSize) {
  if (srcSize === tgtSize) return new Float32Array(src);
  if (tgtSize <= 0) return new Float32Array(0);
  const out = new Float32Array(tgtSize * tgtSize);
  const scale = (srcSize - 1) / Math.max(1, tgtSize - 1);
  for (let y = 0; y < tgtSize; y++) {
    const sy = y * scale;
    const y0 = Math.floor(sy), y1 = Math.min(srcSize - 1, y0 + 1), fy = sy - y0;
    for (let x = 0; x < tgtSize; x++) {
      const sx = x * scale;
      const x0 = Math.floor(sx), x1 = Math.min(srcSize - 1, x0 + 1), fx = sx - x0;
      const top = src[y0 * srcSize + x0] + (src[y0 * srcSize + x1] - src[y0 * srcSize + x0]) * fx;
      const bottom = src[y1 * srcSize + x0] + (src[y1 * srcSize + x1] - src[y1 * srcSize + x0]) * fx;
      out[y * tgtSize + x] = top + (bottom - top) * fy;
    }
  }
  return out;
}

function warpAlphaMap(alphaMap, size, { dx = 0, dy = 0, scale = 1 } = {}) {
  if (size <= 0 || !Number.isFinite(dx) || !Number.isFinite(dy) || !Number.isFinite(scale) || scale <= 0) return new Float32Array(0);
  if (dx === 0 && dy === 0 && scale === 1) return new Float32Array(alphaMap);
  const out = new Float32Array(size * size);
  const c = (size - 1) / 2;
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      const sx = (x - c) / scale + c + dx, sy = (y - c) / scale + c + dy;
      const x0 = wmClamp(Math.floor(sx), 0, size-1), y0 = wmClamp(Math.floor(sy), 0, size-1);
      const x1 = wmClamp(x0+1, 0, size-1), y1 = wmClamp(y0+1, 0, size-1);
      const fx = sx - Math.floor(sx), fy = sy - Math.floor(sy);
      const top = alphaMap[y0*size+x0] + (alphaMap[y0*size+x1] - alphaMap[y0*size+x0]) * fx;
      const bottom = alphaMap[y1*size+x0] + (alphaMap[y1*size+x1] - alphaMap[y1*size+x0]) * fx;
      out[y * size + x] = top + (bottom - top) * fy;
    }
  }
  return out;
}

// --- Alpha Map 缓存 ---
let alphaMapCache = {};
async function getAlphaMapForSize(size) {
  if (alphaMapCache[size]) return alphaMapCache[size];
  if (size !== 48 && size !== 96) {
    const alpha96 = await getAlphaMapForSize(96);
    const interpolated = interpolateAlphaMap(alpha96, 96, size);
    alphaMapCache[size] = interpolated;
    return interpolated;
  }
  const bgImg = size === 96 ? await loadBgImage(BG_96_SRC) : await loadBgImage(BG_48_SRC);
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = size; tmpCanvas.height = size;
  const tmpCtx = tmpCanvas.getContext('2d', { willReadFrequently: true });
  tmpCtx.drawImage(bgImg, 0, 0);
  const bgData = tmpCtx.getImageData(0, 0, size, size);
  // 检查原始像素
  let rawNonZero = 0, rawMax = 0;
  for (let i = 0; i < bgData.data.length; i++) {
    if (bgData.data[i] > rawMax) rawMax = bgData.data[i];
    if (i % 4 !== 3 && bgData.data[i] > 0) rawNonZero++; // 不计算 alpha 通道
  }
  console.log(`[水印] BG image size=${size}: imgDim=${bgImg.width}×${bgImg.height}, rawMax=${rawMax}, rawNonZeroRGB=${rawNonZero}, totalRGBPixels=${bgData.data.length * 3 / 4}`);
  const alphaMap = calculateAlphaMap(bgData);
  // 验证 alpha map
  let maxVal = 0, nonZero = 0;
  for (let i = 0; i < alphaMap.length; i++) { if (alphaMap[i] > maxVal) maxVal = alphaMap[i]; if (alphaMap[i] > 0.01) nonZero++; }
  console.log(`[水印] Alpha map size=${size}: maxVal=${maxVal.toFixed(4)}, nonZero=${nonZero}/${alphaMap.length}`);
  alphaMapCache[size] = alphaMap;
  return alphaMap;
}

// --- 区域相关性计算 ---
function computeRegionSpatialCorrelation(imageData, alphaMap, x, y, size) {
  const patch = toRegionGrayscale(imageData, x, y, size);
  if (patch.length === 0 || patch.length !== alphaMap.length) return 0;
  return ncc(patch, alphaMap);
}

function computeRegionGradientCorrelation(imageData, alphaMap, x, y, size) {
  const patch = toRegionGrayscale(imageData, x, y, size);
  if (patch.length === 0 || patch.length !== alphaMap.length) return 0;
  if (size <= 2) return 0;
  return ncc(sobelMagnitude(patch, size, size), sobelMagnitude(alphaMap, size, size));
}

// --- 信号可靠性检测 ---
function hasReliableStandardSignal(spatialScore, gradientScore) {
  return Number.isFinite(spatialScore) && Number.isFinite(gradientScore) &&
    spatialScore >= MIN_STANDARD_SPATIAL_SCORE && gradientScore >= MIN_STANDARD_GRADIENT_SCORE;
}

function hasReliableAdaptiveSignal(result) {
  if (!result || !result.found) return false;
  const { confidence, spatialScore, gradientScore } = result;
  const size = result.region?.size;
  return Number.isFinite(confidence) && Number.isFinite(spatialScore) && Number.isFinite(gradientScore) && Number.isFinite(size) &&
    confidence >= MIN_ADAPTIVE_CONFIDENCE && spatialScore >= MIN_ADAPTIVE_SPATIAL_SCORE &&
    gradientScore >= MIN_ADAPTIVE_GRADIENT_SCORE && size >= MIN_ADAPTIVE_SIZE && size <= MAX_ADAPTIVE_SIZE;
}

// --- 自适应检测 (coarse-to-fine) ---
function scoreCandidate(context, alphaMap, templateGrad, candidate) {
  const { gray, grad, width, height } = context;
  const { x, y, size } = candidate;
  if (x < 0 || y < 0 || x + size > width || y + size > height) return null;
  const grayRegion = getRegion(gray, width, x, y, size);
  const gradRegion = getRegion(grad, width, x, y, size);
  const spatial = ncc(grayRegion, alphaMap);
  const gradient = ncc(gradRegion, templateGrad);
  let varianceScore = 0;
  if (y > 8) {
    const refY = Math.max(0, y - size);
    const refH = Math.min(size, y - refY);
    if (refH > 8) {
      const wmStd = stdDevRegion(gray, width, x, y, size);
      const refStd = stdDevRegion(gray, width, x, refY, refH);
      if (refStd > WM_EPSILON) varianceScore = wmClamp(1 - wmStd / refStd, 0, 1);
    }
  }
  const confidence = Math.max(0, spatial) * 0.5 + Math.max(0, gradient) * 0.3 + varianceScore * 0.2;
  return { confidence: wmClamp(confidence, 0, 1), spatialScore: spatial, gradientScore: gradient, varianceScore };
}

function createScaleList(minSize, maxSize) {
  const set = new Set();
  for (let s = minSize; s <= maxSize; s += 8) set.add(s);
  if (48 >= minSize && 48 <= maxSize) set.add(48);
  if (96 >= minSize && 96 <= maxSize) set.add(96);
  return [...set].sort((a, b) => a - b);
}

function detectAdaptiveWatermarkRegion(imageData, alpha96, defaultConfig) {
  const { width, height } = imageData;
  const gray = toGrayscale(imageData);
  const grad = sobelMagnitude(gray, width, height);
  const context = { gray, grad, width, height };
  const templateCache = new Map();
  const getTemplate = (size) => {
    if (templateCache.has(size)) return templateCache.get(size);
    const alpha = size === 96 ? alpha96 : interpolateAlphaMap(alpha96, 96, size);
    const tplGrad = sobelMagnitude(alpha, size, size);
    const tpl = { alpha, grad: tplGrad };
    templateCache.set(size, tpl);
    return tpl;
  };

  const baseSize = defaultConfig.logoSize;
  const defaultCandidate = { size: baseSize, x: width - defaultConfig.marginRight - baseSize, y: height - defaultConfig.marginBottom - baseSize };
  const defaultTemplate = getTemplate(baseSize);
  const defaultScore = scoreCandidate(context, defaultTemplate.alpha, defaultTemplate.grad, defaultCandidate);
  console.log(`[水印][adaptive] 默认位置: pos=(${defaultCandidate.x},${defaultCandidate.y}), size=${baseSize}, score=${defaultScore ? `conf=${defaultScore.confidence.toFixed(4)}, spatial=${defaultScore.spatialScore.toFixed(4)}, gradient=${defaultScore.gradientScore.toFixed(4)}, variance=${defaultScore.varianceScore.toFixed(4)}` : 'null'}`);

  // 快速路径：默认位置高置信度
  if (defaultScore && defaultScore.confidence >= ADAPTIVE_DEFAULT_THRESHOLD + 0.08) {
    console.log('[水印][adaptive] 快速路径命中');
    return { found: true, confidence: defaultScore.confidence, spatialScore: defaultScore.spatialScore, gradientScore: defaultScore.gradientScore, varianceScore: defaultScore.varianceScore, region: defaultCandidate };
  }

  const minSize = wmClamp(Math.round(baseSize * 0.65), 24, 144);
  const maxSize = wmClamp(Math.min(Math.round(baseSize * 2.8), Math.floor(Math.min(width, height) * 0.4)), minSize, 192);
  const scaleList = createScaleList(minSize, maxSize);
  const marginRange = Math.max(32, Math.round(baseSize * 0.75));
  const minMR = wmClamp(defaultConfig.marginRight - marginRange, 8, width - minSize - 1);
  const maxMR = wmClamp(defaultConfig.marginRight + marginRange, minMR, width - minSize - 1);
  const minMB = wmClamp(defaultConfig.marginBottom - marginRange, 8, height - minSize - 1);
  const maxMB = wmClamp(defaultConfig.marginBottom + marginRange, minMB, height - minSize - 1);
  console.log(`[水印][adaptive] 搜索范围: sizes=${minSize}-${maxSize}, marginR=${minMR}-${maxMR}, marginB=${minMB}-${maxMB}, scaleList=[${scaleList.join(',')}]`);

  // Coarse search
  const topK = [];
  const pushTopK = (c) => { topK.push(c); topK.sort((a, b) => b.adjustedScore - a.adjustedScore); if (topK.length > 5) topK.length = 5; };
  for (const size of scaleList) {
    const tpl = getTemplate(size);
    for (let mr = minMR; mr <= maxMR; mr += 8) {
      const x = width - mr - size;
      if (x < 0) continue;
      for (let mb = minMB; mb <= maxMB; mb += 8) {
        const y = height - mb - size;
        if (y < 0) continue;
        const score = scoreCandidate(context, tpl.alpha, tpl.grad, { x, y, size });
        if (!score) continue;
        const adjustedScore = score.confidence * Math.min(1, Math.sqrt(size / 96));
        if (adjustedScore < 0.08) continue;
        pushTopK({ size, x, y, adjustedScore });
      }
    }
  }

  // Fine search around top-K
  console.log(`[水印][adaptive] Coarse search: topK=${topK.length}, best=${topK.length > 0 ? `(${topK[0].x},${topK[0].y},size=${topK[0].size},adj=${topK[0].adjustedScore.toFixed(4)})` : 'none'}`);
  let best = defaultScore ? { ...defaultCandidate, ...defaultScore } : { ...defaultCandidate, confidence: 0, spatialScore: 0, gradientScore: 0, varianceScore: 0 };
  for (const coarse of topK) {
    const scaleLo = wmClamp(coarse.size - 10, minSize, maxSize);
    const scaleHi = wmClamp(coarse.size + 10, minSize, maxSize);
    for (let size = scaleLo; size <= scaleHi; size += 2) {
      const tpl = getTemplate(size);
      for (let x = coarse.x - 8; x <= coarse.x + 8; x += 2) {
        if (x < 0 || x + size > width) continue;
        for (let y = coarse.y - 8; y <= coarse.y + 8; y += 2) {
          if (y < 0 || y + size > height) continue;
          const score = scoreCandidate(context, tpl.alpha, tpl.grad, { x, y, size });
          if (score && score.confidence > best.confidence) best = { x, y, size, ...score };
        }
      }
    }
  }

  const result = { found: best.confidence >= ADAPTIVE_DEFAULT_THRESHOLD, confidence: best.confidence, spatialScore: best.spatialScore, gradientScore: best.gradientScore, varianceScore: best.varianceScore, region: { x: best.x, y: best.y, size: best.size } };
  console.log(`[水印][adaptive] 最终结果: found=${result.found}, conf=${result.confidence.toFixed(4)}, pos=(${best.x},${best.y}), size=${best.size}`);
  return result;
}

// --- 标准配置解析 (48/96 自动选择) ---
function resolveInitialStandardConfig(imageData, defaultConfig, alpha48, alpha96) {
  const getStdConfig = (s) => s === 96 ? { logoSize: 96, marginRight: 64, marginBottom: 64 } : { logoSize: 48, marginRight: 32, marginBottom: 32 };
  const primaryConfig = defaultConfig.logoSize === 96 ? getStdConfig(96) : getStdConfig(48);
  const alternateConfig = defaultConfig.logoSize === 96 ? getStdConfig(48) : getStdConfig(96);
  const primaryPos = calculateWatermarkPosition(imageData.width, imageData.height, primaryConfig);
  const alternatePos = calculateWatermarkPosition(imageData.width, imageData.height, alternateConfig);
  if (primaryPos.x < 0 || primaryPos.y < 0 || primaryPos.x + primaryPos.width > imageData.width || primaryPos.y + primaryPos.height > imageData.height) return defaultConfig;
  const primaryAlpha = primaryConfig.logoSize === 96 ? alpha96 : alpha48;
  const primaryScore = computeRegionSpatialCorrelation(imageData, primaryAlpha, primaryPos.x, primaryPos.y, primaryPos.width);
  if (alternatePos.x < 0 || alternatePos.y < 0 || alternatePos.x + alternatePos.width > imageData.width || alternatePos.y + alternatePos.height > imageData.height) return primaryConfig;
  const altAlpha = alternateConfig.logoSize === 96 ? alpha96 : alpha48;
  const altScore = computeRegionSpatialCorrelation(imageData, altAlpha, alternatePos.x, alternatePos.y, alternatePos.width);
  return (altScore >= 0.25 && altScore > primaryScore + 0.08) ? alternateConfig : primaryConfig;
}

// --- 近黑比率 ---
function calculateNearBlackRatio(imageData, position) {
  let nearBlack = 0, total = 0;
  for (let row = 0; row < position.height; row++) {
    for (let col = 0; col < position.width; col++) {
      const idx = ((position.y + row) * imageData.width + (position.x + col)) * 4;
      if (imageData.data[idx] <= NEAR_BLACK_THRESHOLD && imageData.data[idx+1] <= NEAR_BLACK_THRESHOLD && imageData.data[idx+2] <= NEAR_BLACK_THRESHOLD) nearBlack++;
      total++;
    }
  }
  return total > 0 ? nearBlack / total : 0;
}

// --- Template Warp (子像素对齐) ---
function findBestTemplateWarp(originalImageData, alphaMap, position, baselineSpatial, baselineGradient) {
  const size = position.width;
  if (!size || size <= 8) return null;
  let best = { spatialScore: baselineSpatial, gradientScore: baselineGradient, shift: { dx: 0, dy: 0, scale: 1 }, alphaMap };
  for (const scale of TEMPLATE_ALIGN_SCALES) {
    for (const dy of TEMPLATE_ALIGN_SHIFTS) {
      for (const dx of TEMPLATE_ALIGN_SHIFTS) {
        if (dx === 0 && dy === 0 && scale === 1) continue;
        const warped = warpAlphaMap(alphaMap, size, { dx, dy, scale });
        const s = computeRegionSpatialCorrelation(originalImageData, warped, position.x, position.y, size);
        const g = computeRegionGradientCorrelation(originalImageData, warped, position.x, position.y, size);
        const confidence = Math.max(0, s) * 0.7 + Math.max(0, g) * 0.3;
        const bestConf = Math.max(0, best.spatialScore) * 0.7 + Math.max(0, best.gradientScore) * 0.3;
        if (confidence > bestConf + 0.01) best = { spatialScore: s, gradientScore: g, shift: { dx, dy, scale }, alphaMap: warped };
      }
    }
  }
  return (best.spatialScore >= baselineSpatial + 0.01 || best.gradientScore >= baselineGradient + 0.01) ? best : null;
}

// --- Alpha Gain 重校准 ---
function recalibrateAlphaStrength(originalImageData, alphaMap, position, originalSpatial, processedSpatial, origNearBlackRatio) {
  let bestScore = processedSpatial, bestGain = 1, bestData = null;
  const maxNBR = Math.min(1, origNearBlackRatio + MAX_NEAR_BLACK_RATIO_INCREASE);
  for (const gain of ALPHA_GAIN_CANDIDATES) {
    const candidate = cloneImageData(originalImageData);
    removeWatermark(candidate, alphaMap, position, { alphaGain: gain });
    if (calculateNearBlackRatio(candidate, position) > maxNBR) continue;
    const score = computeRegionSpatialCorrelation(candidate, alphaMap, position.x, position.y, position.width);
    if (score < bestScore) { bestScore = score; bestGain = gain; bestData = candidate; }
  }
  // 精细搜索
  for (let delta = -0.05; delta <= 0.05; delta += 0.01) {
    const gain = Number((bestGain + delta).toFixed(2));
    if (gain <= 1 || gain >= 3) continue;
    const candidate = cloneImageData(originalImageData);
    removeWatermark(candidate, alphaMap, position, { alphaGain: gain });
    if (calculateNearBlackRatio(candidate, position) > maxNBR) continue;
    const score = computeRegionSpatialCorrelation(candidate, alphaMap, position.x, position.y, position.width);
    if (score < bestScore) { bestScore = score; bestGain = gain; bestData = candidate; }
  }
  const scoreDelta = processedSpatial - bestScore;
  if (!bestData || scoreDelta < MIN_RECALIBRATION_SCORE_DELTA) return null;
  return { imageData: bestData, alphaGain: bestGain, processedSpatialScore: bestScore, suppressionGain: originalSpatial - bestScore };
}

// --- 子像素轮廓精修 ---
function refineSubpixelOutline(originalImageData, alphaMap, position, alphaGain, origNBR, baselineSpatial, baselineGradient, baselineShift) {
  const size = position.width;
  if (!size || size <= 8 || alphaGain < OUTLINE_REFINEMENT_MIN_GAIN) return null;
  const maxNBR = Math.min(1, origNBR + MAX_NEAR_BLACK_RATIO_INCREASE);
  const gainCandidates = [alphaGain];
  const lower = Math.max(1, Number((alphaGain - 0.01).toFixed(2)));
  const upper = Number((alphaGain + 0.01).toFixed(2));
  if (lower !== alphaGain) gainCandidates.push(lower);
  if (upper !== alphaGain) gainCandidates.push(upper);
  const baseDx = baselineShift?.dx ?? 0, baseDy = baselineShift?.dy ?? 0, baseScale = baselineShift?.scale ?? 1;
  let best = null;
  for (const scaleDelta of SUBPIXEL_REFINE_SCALES) {
    const sc = Number((baseScale * scaleDelta).toFixed(4));
    for (const dyDelta of SUBPIXEL_REFINE_SHIFTS) {
      const dy2 = baseDy + dyDelta;
      for (const dxDelta of SUBPIXEL_REFINE_SHIFTS) {
        const dx2 = baseDx + dxDelta;
        const warped = warpAlphaMap(alphaMap, size, { dx: dx2, dy: dy2, scale: sc });
        for (const gain of gainCandidates) {
          const candidate = cloneImageData(originalImageData);
          removeWatermark(candidate, warped, position, { alphaGain: gain });
          if (calculateNearBlackRatio(candidate, position) > maxNBR) continue;
          const s = computeRegionSpatialCorrelation(candidate, warped, position.x, position.y, size);
          const g = computeRegionGradientCorrelation(candidate, warped, position.x, position.y, size);
          const cost = Math.abs(s) * 0.6 + Math.max(0, g);
          if (!best || cost < best.cost) best = { imageData: candidate, alphaMap: warped, alphaGain: gain, shift: { dx: dx2, dy: dy2, scale: sc }, spatialScore: s, gradientScore: g, cost };
        }
      }
    }
  }
  if (!best) return null;
  if (!(best.gradientScore <= baselineGradient - 0.04) || !(Math.abs(best.spatialScore) <= Math.abs(baselineSpatial) + 0.08)) return null;
  return best;
}

// --- 主入口：完整去水印流程 ---
async function processWatermarkRemoval(canvas, manualGain = 0) {
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  const originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  console.log(`[水印] 开始检测, 图片尺寸: ${canvas.width}×${canvas.height}`);

  // 验证图像数据
  let imgNonZero = 0;
  for (let i = 0; i < Math.min(originalImageData.data.length, 4000); i += 4) {
    if (originalImageData.data[i] > 0 || originalImageData.data[i+1] > 0 || originalImageData.data[i+2] > 0) imgNonZero++;
  }
  console.log(`[水印] 图像数据验证: 前1000像素中非零=${imgNonZero}/1000`);

  const alpha48 = await getAlphaMapForSize(48);
  const alpha96 = await getAlphaMapForSize(96);
  await new Promise(r => setTimeout(r, 10)); // 让 toast 渲染

  // 1. 解析标准配置 (自动选择 48 或 96)
  const defaultConfig = detectWatermarkConfig(canvas.width, canvas.height);
  const config = resolveInitialStandardConfig(originalImageData, defaultConfig, alpha48, alpha96);
  let position = calculateWatermarkPosition(canvas.width, canvas.height, config);
  let alphaMap = config.logoSize === 96 ? alpha96 : alpha48;
  let source = 'standard';
  let adaptiveConfidence = null;
  let alphaGain = 1;

  // 2. 标准位置检测
  const stdSpatial = computeRegionSpatialCorrelation(originalImageData, alphaMap, position.x, position.y, position.width);
  const stdGradient = computeRegionGradientCorrelation(originalImageData, alphaMap, position.x, position.y, position.width);
  console.log(`[水印] 标准检测: spatial=${stdSpatial.toFixed(4)}, gradient=${stdGradient.toFixed(4)}, size=${config.logoSize}, pos=(${position.x},${position.y})`);

  // 3. 如果标准检测不可靠，尝试自适应搜索
  if (!hasReliableStandardSignal(stdSpatial, stdGradient)) {
    console.log('[水印] 标准信号不足，启动自适应搜索...');
    const adaptive = detectAdaptiveWatermarkRegion(originalImageData, alpha96, config);
    adaptiveConfidence = adaptive?.confidence ?? null;
    console.log(`[水印] 自适应搜索: found=${adaptive.found}, confidence=${adaptive.confidence.toFixed(4)}, spatial=${adaptive.spatialScore.toFixed(4)}, gradient=${adaptive.gradientScore.toFixed(4)}, region=(${adaptive.region.x},${adaptive.region.y},size=${adaptive.region.size})`);

    if (!hasReliableAdaptiveSignal(adaptive)) {
      console.warn('[水印] 标准和自适应均未检测到可靠水印信号');
      return null;
    }

    const size = adaptive.region.size;
    position = { x: adaptive.region.x, y: adaptive.region.y, width: size, height: size };
    alphaMap = await getAlphaMapForSize(size);
    source = 'adaptive';
  }

  // 4. 第一次去除 (alphaGain=1)
  let finalImageData = cloneImageData(originalImageData);
  removeWatermark(finalImageData, alphaMap, position);

  // 5. 检查残留，必要时重新自适应
  const residualSpatial = computeRegionSpatialCorrelation(finalImageData, alphaMap, position.x, position.y, position.width);
  if (residualSpatial >= 0.22) {
    console.log(`[水印] 残留较高 (${residualSpatial.toFixed(4)})，尝试自适应修正...`);
    const adaptive2 = detectAdaptiveWatermarkRegion(originalImageData, alpha96, config);
    if (hasReliableAdaptiveSignal(adaptive2)) {
      const size2 = adaptive2.region.size;
      const pos2 = { x: adaptive2.region.x, y: adaptive2.region.y, width: size2, height: size2 };
      const posDelta = Math.abs(pos2.x - position.x) + Math.abs(pos2.y - position.y) + Math.abs(pos2.width - position.width);
      if (posDelta >= 4) {
        position = pos2;
        alphaMap = await getAlphaMapForSize(size2);
        source = 'adaptive';
        finalImageData = cloneImageData(originalImageData);
        removeWatermark(finalImageData, alphaMap, position);
      }
    }
  }

  // 6. Template Warp (子像素对齐)
  let origSpatial = computeRegionSpatialCorrelation(originalImageData, alphaMap, position.x, position.y, position.width);
  let origGradient = computeRegionGradientCorrelation(originalImageData, alphaMap, position.x, position.y, position.width);
  const templateWarp = findBestTemplateWarp(originalImageData, alphaMap, position, origSpatial, origGradient);
  if (templateWarp) {
    alphaMap = templateWarp.alphaMap;
    origSpatial = templateWarp.spatialScore;
    origGradient = templateWarp.gradientScore;
    console.log(`[水印] Template warp: shift=(${templateWarp.shift.dx},${templateWarp.shift.dy},${templateWarp.shift.scale})`);
  }

  // 7. 评估当前处理结果
  let procSpatial = computeRegionSpatialCorrelation(finalImageData, alphaMap, position.x, position.y, position.width);
  let procGradient = computeRegionGradientCorrelation(finalImageData, alphaMap, position.x, position.y, position.width);
  let suppressionGain = origSpatial - procSpatial;

  // 8. Alpha Gain 重校准
  if (origSpatial >= 0.6 && procSpatial >= RESIDUAL_RECALIBRATION_THRESHOLD && suppressionGain <= MIN_SUPPRESSION_FOR_SKIP_RECALIBRATION) {
    console.log('[水印] 启动 alpha gain 重校准...');
    const origNBR = calculateNearBlackRatio(originalImageData, position);
    const recal = recalibrateAlphaStrength(originalImageData, alphaMap, position, origSpatial, procSpatial, origNBR);
    if (recal) {
      finalImageData = recal.imageData;
      alphaGain = recal.alphaGain;
      procSpatial = recal.processedSpatialScore;
      suppressionGain = recal.suppressionGain;
      source = source.includes('adaptive') ? 'adaptive+gain' : 'standard+gain';
      console.log(`[水印] 重校准: gain=${alphaGain}, spatial=${procSpatial.toFixed(4)}`);
    }
  }

  // 如果有手动 gain，覆盖
  if (manualGain > 0 && manualGain !== alphaGain) {
    finalImageData = cloneImageData(originalImageData);
    removeWatermark(finalImageData, alphaMap, position, { alphaGain: manualGain });
    alphaGain = manualGain;
    procSpatial = computeRegionSpatialCorrelation(finalImageData, alphaMap, position.x, position.y, position.width);
    procGradient = computeRegionGradientCorrelation(finalImageData, alphaMap, position.x, position.y, position.width);
    suppressionGain = origSpatial - procSpatial;
    source += '+manual';
  }

  // 9. 子像素轮廓精修
  if (procSpatial <= 0.3 && procGradient >= OUTLINE_REFINEMENT_THRESHOLD) {
    const origNBR = calculateNearBlackRatio(originalImageData, position);
    const baseShift = templateWarp?.shift ?? { dx: 0, dy: 0, scale: 1 };
    const refined = refineSubpixelOutline(originalImageData, alphaMap, position, alphaGain, origNBR, procSpatial, procGradient, baseShift);
    if (refined) {
      finalImageData = refined.imageData;
      alphaGain = refined.alphaGain;
      procSpatial = refined.spatialScore;
      procGradient = refined.gradientScore;
      suppressionGain = origSpatial - procSpatial;
      source += '+subpixel';
      console.log(`[水印] 子像素精修: gain=${alphaGain}, shift=(${refined.shift.dx},${refined.shift.dy},${refined.shift.scale})`);
    }
  }

  // 10. 写回
  ctx.putImageData(finalImageData, 0, 0);
  console.log(`[水印] 去除完成: source=${source}, size=${position.width}, pos=(${position.x},${position.y}), gain=${alphaGain}, origSpatial=${origSpatial.toFixed(3)}, procSpatial=${procSpatial.toFixed(3)}, suppression=${suppressionGain.toFixed(3)}`);
  return { size: position.width, position, gain: alphaGain, source, config: { logoSize: position.width }, originalScore: origSpatial, residualScore: procSpatial };
}


// ========== 应用状态 ==========
let state = {
  originalImage: null,       // 原始上传的 Image 对象
  processedCanvas: null,     // 去水印后的 canvas
  targetW: 1024,
  targetH: 896,
  blockSize: 128,
  cols: 8,
  rows: 7,
  blocks: [],                // 每个块的 canvas
  blockHistory: [],          // 每个块的历史记录
  selectedBlock: -1,
  removeWatermark: true,
  currentTool: 'eraser',
  bgColor: null,             // 检测到的背景色
  // 变换相关 - 每个块独立的变换参数
  blockTransforms: [],       // [{scale, offsetX, offsetY}, ...]
};

// ========== UI ==========
const fileInput = document.getElementById('fileInput');
const gridContainer = document.getElementById('gridContainer');
const uploadArea = document.getElementById('uploadArea');
const previewCanvas = document.getElementById('previewCanvas');
const previewCtx = previewCanvas.getContext('2d');
const infoText = document.getElementById('infoText');
const coordText = document.getElementById('coordText');
const blockInfo = document.getElementById('blockInfo');
const brushSizeInput = document.getElementById('brushSize');
const brushSizeVal = document.getElementById('brushSizeVal');

brushSizeInput.oninput = () => { brushSizeVal.textContent = brushSizeInput.value; };

const transformScaleInput = document.getElementById('transformScale');
const transformScaleVal = document.getElementById('transformScaleVal');
const transformXInput = document.getElementById('transformX');
const transformYInput = document.getElementById('transformY');

transformScaleInput.oninput = () => {
  transformScaleVal.textContent = transformScaleInput.value + '%';
  // 实时预览缩放效果
  const idx = state.selectedBlock;
  if (idx < 0) return;
  const scale = parseInt(transformScaleInput.value) || 100;
  const offsetX = parseInt(transformXInput.value) || 0;
  const offsetY = parseInt(transformYInput.value) || 0;
  state.blockTransforms[idx] = { scale, offsetX, offsetY };
  scaleBlockContent(idx, scale);
};

// 拖拽上传
const gridPanel = document.getElementById('gridPanel');
gridPanel.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
gridPanel.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImageFile(file);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImageFile(e.target.files[0]);
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function toggleWatermarkRemoval() {
  state.removeWatermark = !state.removeWatermark;
  const btn = document.getElementById('btnWatermark');
  btn.textContent = '去水印: ' + (state.removeWatermark ? '开' : '关');
  btn.classList.toggle('active', state.removeWatermark);
}

// 去水印强度滑条
const wmGainInput = document.getElementById('wmGain');
const wmGainVal = document.getElementById('wmGainVal');
wmGainInput.oninput = () => {
  const v = parseInt(wmGainInput.value);
  wmGainVal.textContent = v === 0 ? '自动' : (v / 10).toFixed(1);
};

// 重新去水印（从原图重新处理）
async function reapplyWatermark() {
  if (!state.originalImage) { showToast('请先上传图片'); return; }
  showToast('正在重新去水印...');

  const canvas = document.createElement('canvas');
  canvas.width = state.originalImage.width;
  canvas.height = state.originalImage.height;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.drawImage(state.originalImage, 0, 0);

  if (state.removeWatermark) {
    try {
      const gainVal = parseInt(wmGainInput.value);
      const manualGain = gainVal > 0 ? gainVal / 10 : 0;
      const result = await processWatermarkRemoval(canvas, manualGain);
      if (result) {
        showToast(`去水印完成 (size=${result.size}, gain=${result.gain.toFixed(2)})`);
      } else {
        showToast('⚠ 未检测到水印（可尝试调节强度后重试）');
      }
    } catch (e) {
      console.error('[水印] 重新去水印出错:', e);
      showToast('去水印出错: ' + e.message);
    }
  }

  state.processedCanvas = canvas;
  detectBgColor(canvas);
  applyResize();
}

// ========== 加载图片 ==========
async function loadImageFile(file) {
  const img = new Image();
  img.onload = async () => {
    state.originalImage = img;
    infoText.textContent = `原图: ${img.width}×${img.height}`;

    // 创建处理后的 canvas
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    ctx.drawImage(img, 0, 0);

    // 默认去水印（导入时即处理）
    if (state.removeWatermark) {
      showToast('正在去除水印...');
      try {
        const gainVal = parseInt(wmGainInput.value);
        const manualGain = gainVal > 0 ? gainVal / 10 : 0;
        const result = await processWatermarkRemoval(canvas, manualGain);
        if (result) {
          showToast(`水印已去除 (size=${result.size}, gain=${result.gain.toFixed(2)})`);
        } else {
          showToast('⚠ 未检测到水印，已跳过（可尝试手动调节强度后重新去水印）');
        }
      } catch (e) {
        console.error('[水印] 去水印出错:', e);
        showToast('去水印出错: ' + e.message);
      }
    }

    state.processedCanvas = canvas;

    // 检测背景色 (取四角像素的众数)
    detectBgColor(canvas);

    // 自动应用切分
    applyResize();
  };
  img.src = URL.createObjectURL(file);
}

function detectBgColor(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const corners = [
    ctx.getImageData(0, 0, 1, 1).data,
    ctx.getImageData(w - 1, 0, 1, 1).data,
    ctx.getImageData(0, h - 1, 1, 1).data,
    ctx.getImageData(w - 1, h - 1, 1, 1).data,
  ];
  // 简单取左上角作为背景色
  state.bgColor = { r: corners[0][0], g: corners[0][1], b: corners[0][2], a: corners[0][3] };
}

// ========== 切分 ==========
function applyResize() {
  if (!state.processedCanvas) { showToast('请先上传图片'); return; }

  state.targetW = parseInt(document.getElementById('targetW').value) || 1024;
  state.targetH = parseInt(document.getElementById('targetH').value) || 896;
  state.blockSize = parseInt(document.getElementById('blockSize').value) || 128;
  state.cols = Math.ceil(state.targetW / state.blockSize);
  state.rows = Math.ceil(state.targetH / state.blockSize);

  // 缩放原图到目标尺寸
  const resizedCanvas = document.createElement('canvas');
  resizedCanvas.width = state.targetW;
  resizedCanvas.height = state.targetH;
  const rCtx = resizedCanvas.getContext('2d');

  // 用背景色填充
  if (state.bgColor) {
    rCtx.fillStyle = `rgba(${state.bgColor.r},${state.bgColor.g},${state.bgColor.b},${state.bgColor.a / 255})`;
    rCtx.fillRect(0, 0, state.targetW, state.targetH);
  }

  // 居中绘制
  const src = state.processedCanvas;
  const scale = Math.min(state.targetW / src.width, state.targetH / src.height);
  const sw = src.width * scale, sh = src.height * scale;
  const sx = (state.targetW - sw) / 2, sy = (state.targetH - sh) / 2;
  rCtx.drawImage(src, sx, sy, sw, sh);

  // 切分为块
  state.blocks = [];
  state.blockHistory = [];
  state.blockTransforms = [];
  gridContainer.innerHTML = '';
  gridContainer.style.display = 'inline-grid';
  gridContainer.style.gridTemplateColumns = `repeat(${state.cols}, ${state.blockSize}px)`;
  uploadArea.style.display = 'none';

  for (let r = 0; r < state.rows; r++) {
    for (let c = 0; c < state.cols; c++) {
      const bCanvas = document.createElement('canvas');
      bCanvas.width = state.blockSize;
      bCanvas.height = state.blockSize;
      const bCtx = bCanvas.getContext('2d');

      // 从缩放后的图绘制块
      bCtx.drawImage(resizedCanvas, c * state.blockSize, r * state.blockSize,
        state.blockSize, state.blockSize, 0, 0, state.blockSize, state.blockSize);

      state.blocks.push(bCanvas);
      state.blockHistory.push([cloneCanvas(bCanvas)]); // 初始状态
      state.blockTransforms.push({ scale: 100, offsetX: 0, offsetY: 0 });

      // 创建 grid cell
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.style.width = state.blockSize + 'px';
      cell.style.height = state.blockSize + 'px';
      const displayCanvas = document.createElement('canvas');
      displayCanvas.width = state.blockSize;
      displayCanvas.height = state.blockSize;
      displayCanvas.getContext('2d').drawImage(bCanvas, 0, 0);
      cell.appendChild(displayCanvas);
      cell.dataset.index = r * state.cols + c;
      cell.addEventListener('click', () => selectBlock(parseInt(cell.dataset.index)));
      gridContainer.appendChild(cell);
    }
  }

  infoText.textContent = `${state.targetW}×${state.targetH} → ${state.cols}×${state.rows} 块 (${state.blockSize}px)`;
  state.selectedBlock = -1;
  updatePreview();

  // 显示缩放条，自动适应
  document.getElementById('zoomBar').style.display = 'flex';
  // 延迟一帧等布局完成后计算适应比例
  requestAnimationFrame(() => {
    zoomToFit();
  });

  showToast('切分完成');
}

function cloneCanvas(src) {
  const c = document.createElement('canvas');
  c.width = src.width; c.height = src.height;
  c.getContext('2d').drawImage(src, 0, 0);
  return c;
}

// ========== 块选择与预览 ==========
function selectBlock(idx) {
  state.selectedBlock = idx;
  // 更新选中样式
  document.querySelectorAll('.grid-cell').forEach((cell, i) => {
    cell.classList.toggle('selected', i === idx);
  });
  const r = Math.floor(idx / state.cols), c = idx % state.cols;
  coordText.textContent = `块 [${c}, ${r}]`;
  blockInfo.textContent = `位置: (${c * state.blockSize}, ${r * state.blockSize}) 尺寸: ${state.blockSize}×${state.blockSize}`;
  // 加载该块的变换参数到 UI
  loadTransformUI(idx);
  updatePreview();
}

function updatePreview() {
  if (state.selectedBlock < 0 || state.selectedBlock >= state.blocks.length) {
    previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    return;
  }
  const src = state.blocks[state.selectedBlock];
  previewCanvas.width = src.width;
  previewCanvas.height = src.height;
  previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
  previewCtx.drawImage(src, 0, 0);
}

function updateGridCell(idx) {
  const cells = gridContainer.children;
  if (idx < cells.length) {
    const displayCanvas = cells[idx].querySelector('canvas');
    displayCanvas.getContext('2d').clearRect(0, 0, displayCanvas.width, displayCanvas.height);
    displayCanvas.getContext('2d').drawImage(state.blocks[idx], 0, 0);
  }
}

// ========== 编辑工具 ==========
function setTool(tool) {
  state.currentTool = tool;
  document.getElementById('btnEraser').classList.toggle('active', tool === 'eraser');
  document.getElementById('btnBrush').classList.toggle('active', tool === 'brush');
  document.getElementById('btnMove').classList.toggle('active', tool === 'move');
  previewCanvas.style.cursor = tool === 'move' ? 'grab' : 'crosshair';
}

// 预览 canvas 上的绘制 / 移动
let isDrawing = false;
let lastX = -1, lastY = -1;

previewCanvas.addEventListener('mousedown', e => {
  if (state.selectedBlock < 0) return;
  isDrawing = true;
  const pos = getCanvasPos(e);

  if (state.currentTool === 'move') {
    // 移动模式：记录起点，不绘制
    lastX = pos.x; lastY = pos.y;
    pushHistory(state.selectedBlock);
  } else {
    // 绘制模式
    pushHistory(state.selectedBlock);
    draw(pos.x, pos.y);
    lastX = pos.x; lastY = pos.y;
  }
});

previewCanvas.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const pos = getCanvasPos(e);

  if (state.currentTool === 'move') {
    // 移动模式：平移块内容
    const dx = pos.x - lastX;
    const dy = pos.y - lastY;
    if (dx !== 0 || dy !== 0) {
      moveBlockContent(state.selectedBlock, dx, dy);
      // 更新变换参数
      const t = state.blockTransforms[state.selectedBlock];
      t.offsetX += dx;
      t.offsetY += dy;
      loadTransformUI(state.selectedBlock);
      lastX = pos.x; lastY = pos.y;
    }
  } else {
    drawLine(lastX, lastY, pos.x, pos.y);
    lastX = pos.x; lastY = pos.y;
  }
});

previewCanvas.addEventListener('mouseup', () => { isDrawing = false; lastX = lastY = -1; });
previewCanvas.addEventListener('mouseleave', () => { isDrawing = false; lastX = lastY = -1; });

function getCanvasPos(e) {
  const rect = previewCanvas.getBoundingClientRect();
  const scaleX = previewCanvas.width / rect.width;
  const scaleY = previewCanvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

function draw(x, y) {
  const idx = state.selectedBlock;
  const ctx = state.blocks[idx].getContext('2d');
  const size = parseInt(brushSizeInput.value);

  if (state.currentTool === 'eraser') {
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else if (state.currentTool === 'brush') {
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = document.getElementById('brushColor').value;
    ctx.beginPath();
    ctx.arc(x, y, size / 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  updatePreview();
  updateGridCell(idx);
}

function drawLine(x0, y0, x1, y1) {
  const dist = Math.sqrt((x1 - x0) ** 2 + (y1 - y0) ** 2);
  const steps = Math.max(1, Math.ceil(dist / 2));
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    draw(x0 + (x1 - x0) * t, y0 + (y1 - y0) * t);
  }
}

// ========== 撤销/重置 ==========
function pushHistory(idx) {
  if (!state.blockHistory[idx]) state.blockHistory[idx] = [];
  // 最多保留 20 步
  if (state.blockHistory[idx].length > 20) state.blockHistory[idx].shift();
  state.blockHistory[idx].push(cloneCanvas(state.blocks[idx]));
}

function undoEdit() {
  const idx = state.selectedBlock;
  if (idx < 0) return;
  const hist = state.blockHistory[idx];
  if (!hist || hist.length <= 1) { showToast('没有更多撤销记录'); return; }
  hist.pop(); // 移除当前状态
  const prev = hist[hist.length - 1];
  const ctx = state.blocks[idx].getContext('2d');
  ctx.clearRect(0, 0, state.blockSize, state.blockSize);
  ctx.drawImage(prev, 0, 0);
  updatePreview();
  updateGridCell(idx);
}

function resetBlock() {
  const idx = state.selectedBlock;
  if (idx < 0) return;
  const hist = state.blockHistory[idx];
  if (!hist || hist.length === 0) return;
  const first = hist[0];
  const ctx = state.blocks[idx].getContext('2d');
  ctx.clearRect(0, 0, state.blockSize, state.blockSize);
  ctx.drawImage(first, 0, 0);
  state.blockHistory[idx] = [cloneCanvas(first)];
  updatePreview();
  updateGridCell(idx);
  showToast('块已重置');
}

function clearBlock() {
  const idx = state.selectedBlock;
  if (idx < 0) return;
  pushHistory(idx);
  const ctx = state.blocks[idx].getContext('2d');
  ctx.clearRect(0, 0, state.blockSize, state.blockSize);
  updatePreview();
  updateGridCell(idx);
  showToast('块已清空');
}

// ========== 块内容变换 ==========

// 平移块内容（就地修改块 canvas）
function moveBlockContent(idx, dx, dy) {
  const blockCanvas = state.blocks[idx];
  const size = state.blockSize;
  // 拷贝当前内容
  const tmp = cloneCanvas(blockCanvas);
  const ctx = blockCanvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  // 填充背景色
  if (state.bgColor) {
    ctx.fillStyle = `rgba(${state.bgColor.r},${state.bgColor.g},${state.bgColor.b},${state.bgColor.a / 255})`;
    ctx.fillRect(0, 0, size, size);
  }
  // 偏移绘制
  ctx.drawImage(tmp, dx, dy);
  updatePreview();
  updateGridCell(idx);
}

// 缩放块内容（基于块中心缩放，保留背景色）
function scaleBlockContent(idx, scalePercent) {
  const blockCanvas = state.blocks[idx];
  const size = state.blockSize;
  const hist = state.blockHistory[idx];
  // 始终从初始状态重新计算，避免多次缩放导致质量劣化
  const original = hist[0];
  const ctx = blockCanvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  // 填充背景色
  if (state.bgColor) {
    ctx.fillStyle = `rgba(${state.bgColor.r},${state.bgColor.g},${state.bgColor.b},${state.bgColor.a / 255})`;
    ctx.fillRect(0, 0, size, size);
  }
  const s = scalePercent / 100;
  const t = state.blockTransforms[idx];
  const newW = size * s, newH = size * s;
  const drawX = (size - newW) / 2 + t.offsetX;
  const drawY = (size - newH) / 2 + t.offsetY;
  ctx.drawImage(original, drawX, drawY, newW, newH);
  updatePreview();
  updateGridCell(idx);
}

// 应用变换（从 UI 读取参数，应用到选中块）
function applyTransform() {
  const idx = state.selectedBlock;
  if (idx < 0) { showToast('请先选择一个块'); return; }
  pushHistory(idx);

  const scale = parseInt(transformScaleInput.value) || 100;
  const offsetX = parseInt(transformXInput.value) || 0;
  const offsetY = parseInt(transformYInput.value) || 0;

  state.blockTransforms[idx] = { scale, offsetX, offsetY };
  scaleBlockContent(idx, scale);
  showToast(`变换已应用: ${scale}% (${offsetX}, ${offsetY})`);
}

// 加载块的变换参数到 UI
function loadTransformUI(idx) {
  if (idx < 0 || !state.blockTransforms[idx]) return;
  const t = state.blockTransforms[idx];
  transformScaleInput.value = t.scale;
  transformScaleVal.textContent = t.scale + '%';
  transformXInput.value = t.offsetX;
  transformYInput.value = t.offsetY;
}

// 批量应用变换到指定块列表
function batchApplyTransform(indices) {
  const idx = state.selectedBlock;
  if (idx < 0) { showToast('请先选择一个块'); return; }
  const t = state.blockTransforms[idx];
  let count = 0;
  for (const i of indices) {
    if (i === idx) continue; // 跳过当前块
    pushHistory(i);
    state.blockTransforms[i] = { ...t };
    scaleBlockContent(i, t.scale);
    count++;
  }
  showToast(`已应用到 ${count} 个块`);
}

// 应用到整行
function applyToRow() {
  const idx = state.selectedBlock;
  if (idx < 0) { showToast('请先选择一个块'); return; }
  const row = Math.floor(idx / state.cols);
  const indices = [];
  for (let c = 0; c < state.cols; c++) indices.push(row * state.cols + c);
  batchApplyTransform(indices);
}

// 应用到整列
function applyToCol() {
  const idx = state.selectedBlock;
  if (idx < 0) { showToast('请先选择一个块'); return; }
  const col = idx % state.cols;
  const indices = [];
  for (let r = 0; r < state.rows; r++) indices.push(r * state.cols + col);
  batchApplyTransform(indices);
}

// 应用到全部
function applyToAll() {
  const idx = state.selectedBlock;
  if (idx < 0) { showToast('请先选择一个块'); return; }
  const indices = [];
  for (let i = 0; i < state.blocks.length; i++) indices.push(i);
  batchApplyTransform(indices);
}

// 重置变换参数
function resetTransformUI() {
  const idx = state.selectedBlock;
  if (idx < 0) return;
  state.blockTransforms[idx] = { scale: 100, offsetX: 0, offsetY: 0 };
  loadTransformUI(idx);
  // 恢复初始内容
  const hist = state.blockHistory[idx];
  if (hist && hist.length > 0) {
    pushHistory(idx);
    const first = hist[0];
    const ctx = state.blocks[idx].getContext('2d');
    ctx.clearRect(0, 0, state.blockSize, state.blockSize);
    ctx.drawImage(first, 0, 0);
    updatePreview();
    updateGridCell(idx);
  }
  showToast('变换参数已重置');
}

// ========== 导出 ==========
function exportImage() {
  if (state.blocks.length === 0) { showToast('请先切分图片'); return; }

  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = state.targetW;
  exportCanvas.height = state.targetH;
  const ctx = exportCanvas.getContext('2d');

  // 填充背景色
  if (state.bgColor) {
    ctx.fillStyle = `rgba(${state.bgColor.r},${state.bgColor.g},${state.bgColor.b},${state.bgColor.a / 255})`;
    ctx.fillRect(0, 0, state.targetW, state.targetH);
  }

  // 绘制所有块
  for (let r = 0; r < state.rows; r++) {
    for (let c = 0; c < state.cols; c++) {
      const idx = r * state.cols + c;
      ctx.drawImage(state.blocks[idx], c * state.blockSize, r * state.blockSize);
    }
  }

  // 下载
  const link = document.createElement('a');
  link.download = `adjusted_${state.targetW}x${state.targetH}.png`;
  link.href = exportCanvas.toDataURL('image/png');
  link.click();
  showToast('图片已导出');
}

// ========== 网格缩放 ==========
let gridZoomLevel = 100;

function setGridZoom(percent) {
  gridZoomLevel = Math.max(5, Math.min(100, percent));
  gridContainer.style.transform = `scale(${gridZoomLevel / 100})`;
  document.getElementById('gridZoom').value = gridZoomLevel;
  document.getElementById('gridZoomVal').textContent = gridZoomLevel + '%';
}

function zoomGrid(delta) {
  setGridZoom(gridZoomLevel + delta);
}

function zoomToFit() {
  const panel = document.getElementById('gridPanel');
  const panelW = panel.clientWidth - 40; // padding
  const panelH = panel.clientHeight - 80; // zoom bar + padding
  const gridW = state.cols * state.blockSize + state.cols; // gap
  const gridH = state.rows * state.blockSize + state.rows;
  const fit = Math.min(panelW / gridW, panelH / gridH, 1) * 100;
  setGridZoom(Math.floor(fit));
}

// 鼠标滚轮缩放网格
document.getElementById('gridPanel').addEventListener('wheel', e => {
  if (!state.blocks.length) return;
  // 只在按住 Ctrl/Cmd 时缩放，否则正常滚动
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  zoomGrid(e.deltaY > 0 ? -5 : 5);
}, { passive: false });

// 初始化工具状态
setTool('eraser');
</script>
</body>
</html>
